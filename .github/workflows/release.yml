name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to push tags + create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for changelog
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install Versionize
        run: dotnet tool restore

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run Versionize
        id: versionize
        run: |
          dotnet versionize --changelog-all
          $version = dotnet versionize --inspect
          echo "version=$version" >> $env:GITHUB_OUTPUT
        continue-on-error: true  # skips if no releasable commits

      - name: Push changes and tag
        if: steps.versionize.outcome == 'success'
        run: git push --follow-tags origin main

      - name: Build
        if: steps.versionize.outcome == 'success'
        run: dotnet build --configuration Release

      - name: Publish
        if: steps.versionize.outcome == 'success'
        run: |
          dotnet publish --configuration Release `
            --output ./publish `
            --no-build

      - name: Create GitHub Release
        if: steps.versionize.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.versionize.outputs.version }}"
          body_path: CHANGELOG.md
          files: |
            ./publish/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
